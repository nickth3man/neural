[mypy]
python_version = 3.12
mypy_path = src

# Third-party libs without bundled stubs (or when IDE venv omits types-* packages).
[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-urllib3]
ignore_missing_imports = True

[mypy-urllib3.*]
ignore_missing_imports = True

[mypy-tqdm]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True
