repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        description: Run ruff linter on Python files
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false
        args: [neural, scripts, tests, webapp]

      - id: ruff-format
        name: ruff format
        description: Check ruff formatting on Python files
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false
        args: [neural, scripts, tests, webapp]

      - id: ty-check
        name: ty check
        description: Run ty type checker on Python files
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        args: [neural, scripts, webapp]
